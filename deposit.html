<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <title>Depósitos</title>
</head>

<body>
  <div class="logo">
    <img src="img/logo.png" alt="Alke Wallet">
  </div>
  <div class="container mt-4">
    <div class="card shadow p-4 mx-auto" style="max-width:500px;">
      <h2 class="text-center mb-4">Depositar Dinero</h2>
    <form>
      <div class="mb-3">
        <label for="monto" class="form-label">Monto a Depositar</label>
        <input
          type="number"
          id="monto"
          class="form-control"
          placeholder="Ingrese el monto">
      </div>

    <div class="d-grid gap-3">
      <button type="button" id="btnDepositar" class="btn btn-success btn-lg">Realizar Depósito</button>
        <a href="menu.html" class="btn btn-secondary">Volver al Menú Principal</a>
      </div>
    
    <div>
      <p id="mensajeDeposito" class="text-center fw-bold mt-3"></p>
    </div>
    </form>
    </div>
  </div>

  <script src="js/deposit.js"></script>
</body>

</html>
