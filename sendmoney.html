<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <title>Enviar Dinero</title>
</head>

<body>
  <div class="logo">
    <img src="img/logo.png" alt="Alke Wallet">
  </div>
  <div class="container mt-4">
    <div class="card shadow p-4 mx-auto" style="max-width:600px;">
      <h2 class="text-center mb-4">Enviar Dinero</h2>
      <form>
      <div class="mb-3">
        <label class="form-label">Buscar Contacto</label>
          <input
            type="text"
            class="form-control"
            placeholder="Ingrese el nombre del contacto">
      </div>
      <div class="d-grid gap-3">
        <button type="button" class="btn btn-primary">Buscar</button>
      <h3>Contactos</h3>
      <ul id="contactList" class="list-group">
        <li class="list-group-item">
          <div class="contact-info">
            <span class="contact-name">Marlon Guerra</span>
            <span class="contact-details">RUT: 15.535.525-3, Alias: Marlon.Guerra, Banco: BCI</span>
          </div>
        </li>
        <li class="list-group-item">
          <div class="contact-info">
            <span class="contact-name">Marcia Rojas</span>
          <span class="contact-details">RUT: 5.735.624-4, Alias: Marcia.Rojas, Banco: Santander</span>
          </div>
        </li>
      </ul>
        <button
            type="button"
            class="btn btn-success"
            data-bs-toggle="modal"
            data-bs-target="#nuevoContacto">Agregar Nuevo Contacto</button>
          <a href="menu.html" class="btn btn-secondary">Volver al Menú Principal</a>
      </div>
      </form>
    </div>
  </div>

  <div class="modal fade" id="nuevoContacto" tabindex="-1">
    <div class="modal-dialog">
    <div class="modal-content">
    <div class="modal-header">
      <h5 class="modal-title">Nuevo Contacto</h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal">
        </button>
    </div>

    <div class="modal-body">
    <div class="mb-3">
      <label class="form-label">Nombre</label>
        <input
          type="text"
          class="form-control">
    </div>

    <div class="mb-3">
      <label class="form-label">Número de Cuenta</label>
        <input
          type="text"
          class="form-control">
    </div>
    </div>

    <div class="modal-footer">
      <button
        type="button"
        class="btn btn-secondary"
        data-bs-dismiss="modal">Cancelar</button>
      <button
        type="button"
        class="btn btn-success">Guardar Contacto</button>
    </div>
    </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
