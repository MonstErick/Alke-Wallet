<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <title>Enviar Dinero</title>
</head>

<body>
  <div class="logo">
    <img src="img/logo.png" alt="Alke Wallet">
  </div>
  <div class="container mt-4">
    <div class="card shadow p-4 mx-auto" style="max-width:600px;">
      <h2 class="text-center mb-4">Enviar Dinero</h2>
      <form>
      <div class="mb-3">
        <label class="form-label">Buscar Contacto</label>
          <input
            type="text"
            class="form-control"
            placeholder="Ingrese el nombre del contacto">
      </div>

      <button type="button" class="btn btn-primary w-100 mb-3">Buscar</button>

      <h3>Contactos</h3>
      <ul id="contactList" class="list-group mb-3">
        <li class="list-group-item">
          <input type="radio" name="contacto" value="Marlon Guerra">
          <span class="contact-name">Marlon Guerra</span>
          <br>
          <span class="contact-details">Número de Cuenta: 9866373732, Alias: Marlon.Guerra, Banco: BCI</span>
        </li>

        <li class="list-group-item">
          <input type="radio" name="contacto" value="Marcia Rojas">
          <span class="contact-name">Marcia Rojas</span>
          <br>
          <span class="contact-details">Número de Cuenta: 667374425, Alias: Marcia.Rojas, Banco: Santander</span>
        </li>
      </ul>

      <div class="mb-3">
        <label class="form-label">Monto a Enviar</label>
        <input
          type="number"
          id="montoEnviar"
          class="form-control"
          placeholder="Ingrese el Monto">
      </div>

  <p id="mensajeEnvio" class="text-center fw-bold"></p>

  <div class="d-grid gap-3">
    <button type="button" id="btnEnviarDinero" class="btn btn-warning">Enviar Dinero</button>
  
    <button
      type="button"
      class="btn btn-success"
      data-bs-toggle="modal"
      data-bs-target="#nuevoContacto">Agregar Nuevo Contacto</button>
          
      <a href="menu.html" class="btn btn-secondary">Volver al Menú Principal</a>
      </div>
      </form>
    </div>
  </div>

  <div class="modal fade" id="nuevoContacto" tabindex="-1">
    <div class="modal-dialog">
    <div class="modal-content">
    <div class="modal-header">
      <h5 class="modal-title">Nuevo Contacto</h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal">
        </button>
    </div>

    <div class="modal-body">
    <div class="mb-3">
      <label class="form-label">Nombre</label>
        <input
          type="text"
          id="nombreContacto"
          class="form-control">
    </div>

    <div class="mb-3">
      <label class="form-label">Número de Cuenta</label>
        <input
          type="text"
          id="numeroCuenta"
          class="form-control">
    </div>

    <div class="mb-3">
      <label class="form-label">Alias</label>
      <input 
      type="text" 
      id="aliasContacto" 
      class="form-control">
    </div>

    <div class="mb-3">
      <label class="form-label">Nombre del Banco</label>
      <input type="text" 
      id="bancoContacto" 
      class="form-control">
    </div>
    </div>

    <div class="modal-footer">
      <button
        type="button"
        class="btn btn-secondary"
        data-bs-dismiss="modal">Cancelar</button>
      <button
        type="button"
        id="btnGuardarContacto"
        class="btn btn-success">Guardar Contacto</button>
    </div>
    </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/sendmoney.js"></script>

</body>

</html>
