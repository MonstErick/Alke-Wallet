<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <title>Últimos Movimientos</title>
</head>

<body>
  <div class="logo">
    <img src="img/logo.png" alt="Alke Wallet">
  </div>

  <div class="container mt-4">
    <div class="card shadow p-4 mx-auto" style="max-width:600px;">
      <h2 class="text-center mb-4">Últimos Movimientos</h2>

      <div class="mb-4">
        <label for="filtroMovimientos" class="form-label">Filtrar por Tipo de Movimiento</label>
        <select id="filtroMovimientos" class="form-select">
          <option value="todos">Todos los Movimientos</option>
          <option value="Depósito">Depósitos</option>
          <option value="Envío">Envíos de Dinero</option>
          <option value="Compra">Compra</option>
        </select>
      </div>

      <ul id="listaMovimientos" class="list-group mb-4"></ul>

      <div class="d-grid">
        <a href="menu.html" class="btn btn-secondary">
          Volver al Menú Principal
        </a>
      </div>

    </div>
  </div>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="js/transactions.js"></script>

</body>

</html>
